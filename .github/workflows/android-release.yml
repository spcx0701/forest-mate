name: Android Release APKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to upload to when upload_to_release is enabled.
        required: false
      upload_to_release:
        description: Upload the signed APK and checksum to the release_tag release.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  apk:
    name: Build signed Android and Wear OS APKs
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: packaging/android
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-signing.keystore
          chmod 600 android-signing.keystore

      - name: Build signed phone and watch APKs
        env:
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.BUBBLEWRAP_KEY_PASSWORD }}
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.BUBBLEWRAP_KEYSTORE_PASSWORD }}
        run: |
          ./gradlew --no-daemon :app:assembleRelease :wear:assembleRelease
          mkdir -p dist
          asset_tag="${RELEASE_TAG#android-}"
          test -n "$asset_tag" || asset_tag="local"
          cp app/build/outputs/apk/release/app-release.apk "dist/forestmate-android-${asset_tag}.apk"
          cp wear/build/outputs/apk/release/wear-release.apk "dist/forestmate-wear-${asset_tag}.apk"
          shasum -a 256 dist/*.apk > "dist/forestmate-android-${asset_tag}.sha256"

      - name: Generate build provenance
        id: apk-provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: packaging/android/dist/*.apk

      - name: Stage release provenance bundle
        if: ${{ github.event_name == 'release' || inputs.upload_to_release }}
        env:
          PROVENANCE_BUNDLE: ${{ steps.apk-provenance.outputs.bundle-path }}
        run: |
          test -n "$RELEASE_TAG"
          test -n "$PROVENANCE_BUNDLE"
          asset_tag="${RELEASE_TAG#android-}"
          cp "$PROVENANCE_BUNDLE" "dist/forestmate-android-${asset_tag}.sigstore.json"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: forestmate-android-apks
          path: |
            packaging/android/dist/*.apk
            packaging/android/dist/*.sha256
            packaging/android/dist/*.sigstore.json
          if-no-files-found: error

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || inputs.upload_to_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -n "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" dist/*.apk dist/*.sha256 dist/*.sigstore.json --repo "$GITHUB_REPOSITORY" --clobber
