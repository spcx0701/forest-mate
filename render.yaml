# 숲길동무 — Render 무료 배포 청사진(Blueprint)
# https://render.com → New → Blueprint → 이 저장소 연결 → 자동 인식.
# 한 서비스가 API(/api/v1/*)와 PWA(app/ 정적)를 같은 HTTPS 오리진에서 서빙한다.
# 배포되면 https://forestmate.onrender.com 형태의 공개 URL이 생긴다(스토어 등록의 토대).
services:
  - type: web
    name: forestmate
    runtime: docker
    plan: free                      # 무료 플랜(유휴 시 슬립 — 첫 요청 시 수십 초 콜드스타트)
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore               # 한국에서 가장 가까운 무료 리전
    healthCheckPath: /api/v1/healthz
    autoDeploy: true
    envVars:
      - key: ENV
        value: prod
      # 산행·기기·SOS·푸시구독 영속(재배포·슬립에도 유지) — 무료 PostgreSQL 연결.
      - key: DATABASE_URL
        fromDatabase: { name: forestmate-db, property: connectionString }
      # 푸시 알림(VAPID) — 대시보드에서 비밀값으로 입력(비우면 푸시 비활성).
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # 관제 히트맵 최소 군집(위치정보법). 실사용자 50명 미만 데모 단계는 1,
      # 정식 운영 전환 시 50으로 올린다.
      - key: K_ANONYMITY
        value: "1"
      - key: DISTRESS_STALL_MINUTES
        value: "30"
      - key: CORS_ORIGINS
        value: "*"                  # 운영 전환 시 앱/웹 도메인만 화이트리스트
      # 공공데이터포털 키 — 비우면 동일 스키마 스냅샷 폴백. 대시보드에서 비밀값으로 입력.
      - key: DATA_GO_KR_KEY
        sync: false
      # Claude API 키 — 비우면 규칙 기반 챗. 대시보드에서 비밀값으로 입력.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-opus-4-8
      - key: LLM_MAX_TOKENS
        value: "1024"
      - key: PUBLIC_BASE_URL
        value: https://forestmate.onrender.com
      - key: AUTH_SESSION_DAYS
        value: "90"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false

# 무료 PostgreSQL — Blueprint 배포 시 자동 프로비저닝되어 DATABASE_URL 주입.
databases:
  - name: forestmate-db
    plan: free
    region: singapore
